# Detekt configuration for MovieHub KMP project

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 120
  LongParameterList:
    active: true
    threshold: 10
  LargeClass:
    active: true
    threshold: 600
  ComplexMethod:
    active: true
    threshold: 20

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][a-zA-Z0-9]*'

style:
  active: true
  WildcardImport:
    active: false # Wildcard imports are common in KMP for graphics/layouts
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '3'
      - '10'
      - '100'
      - '1000'
      - '12'
      - '24'
      - '48'
      - '0f'
      - '1f'
      - '0.0f'
      - '1.0f'
      - '0.5f'
      - '0.12f'
      - '0.06f'
      - '0.15f'
      - '0.25f'
      - '0.3f'
      - '0.8f'
      - '0.85f'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true

formatting:
  active: true
  android: true
  autoCorrect: true
