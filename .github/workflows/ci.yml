name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (read-only cache on PRs)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check formatting (Spotless)
        run: ./gradlew :core:player-api:spotlessCheck :feature:player:spotlessCheck

      - name: Static analysis (Detekt)
        run: ./gradlew :core:player-api:detekt :feature:player:detekt

  build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (read-only cache on PRs)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Android debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MovieHub-debug
          path: composeApp/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
